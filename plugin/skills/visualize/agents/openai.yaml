interface:
  display_name: "AndThen - Visualize"
  short_description: "Render any AndThen artifact (PRD, plan.json, FIS, requirements-clarification, product vision, review report, architecture trade-off / strategic-design / fitness / decompose / event-storming report, or ADR) as a read-only HTML view with section-anchored notes"
  default_prompt: "Render the workflow artifact as a self-contained HTML file with section-anchored note-taking and open it in the user's browser. Artifact path: "

policy:
  allow_implicit_invocation: true
